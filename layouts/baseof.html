<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  <script>
    (function() {
      var html = document.documentElement;
      html.setAttribute('data-theme', 'retro');
      localStorage.setItem('theme', 'retro'); // Force reset on load

      html.classList.add('retro-fonts-loading');
      var revealed = false;
      function reveal() {
        if (revealed) return;
        revealed = true;
        html.classList.remove('retro-fonts-loading');
      }
      document.fonts.ready.then(reveal);
      setTimeout(reveal, 3000);
    })();
  </script>
  {{ partial "head.html" . }}
</head>
<body>
  <header>
    {{ partial "header.html" . }}
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <footer>
    {{ partial "footer.html" . }}
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Theme toggle is disabled to lock into Retro mode
      var themeToggle = document.querySelector('.theme-toggle');
      if (themeToggle) {
        themeToggle.addEventListener('click', function(e) {
          e.preventDefault();
          // Intentional no-op: locked to custom retro blue theme
        });
      }

      // Language dropdown toggles (header + footer)
      var dropdowns = document.querySelectorAll('.lang-dropdown');
      dropdowns.forEach(function(dropdown) {
        var langToggle = dropdown.querySelector('.lang-toggle');

        langToggle.addEventListener('click', function(e) {
          e.stopPropagation();
          dropdown.classList.toggle('open');
          langToggle.setAttribute('aria-expanded', dropdown.classList.contains('open'));
        });

        document.addEventListener('click', function(e) {
          if (!dropdown.contains(e.target)) {
            dropdown.classList.remove('open');
            langToggle.setAttribute('aria-expanded', 'false');
          }
        });
      });
    });
  </script>

  {{- /* Optional: Mermaid support (kept minimal). */ -}}
  {{- if .Store.Get "hasMermaid" -}}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
    function getTheme() {
      var stored = localStorage.getItem('theme');
      if (stored) return (stored === 'dark' || stored === 'retro') ? 'dark' : 'default';
      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default';
    }
    mermaid.initialize({ startOnLoad: false, securityLevel: 'loose', theme: getTheme() });
    mermaid.run({ querySelector: '.mermaid' });
  </script>
  {{- end -}}
</body>
</html>
